<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Baithak - Hunger Jargon</title>
    <style>
        :root { 
            --primary: #d32f2f; 
            --primary-dark: #b71c1c; 
            --accent-red: #e53935; 
            --text-dark: #282c3f; 
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; color: var(--text-dark); }
        .container { max-width: 450px; margin: 0 auto; background: white; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        .header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; padding: 25px 20px; display: flex; align-items: center; }
        .admin-icon-trigger { width: 55px; height: 55px; background: white; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-right: 15px; overflow: hidden; border: 2px solid rgba(255,255,255,0.5); -webkit-tap-highlight-color: transparent; }
        #displayLogo { width: 100%; height: 100%; object-fit: cover; }

        #customerView, #adminPanel, #loginView, #summaryView { padding: 20px; }
        #adminPanel, #loginView, #summaryView { display: none; }

        .contact-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); margin-top: -40px; position: relative; border-bottom: 2px solid var(--primary); font-size: 13px; text-align: center; }
        .custom-banner { background: #fff3e0; border: 1px dashed #ff9800; color: #e65100; padding: 10px; border-radius: 8px; margin: 15px 0; font-size: 13px; text-align: center; font-weight: 500; display: none; }
        .category-header { background: #f8f8f8; padding: 10px 15px; margin: 20px -20px 10px -20px; border-left: 5px solid var(--primary); font-weight: bold; color: var(--primary); text-transform: uppercase; font-size: 13px; }

        .menu-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .menu-item.is-inactive { filter: grayscale(100%); opacity: 0.5; pointer-events: none; }
        .item-img { width: 55px; height: 55px; border-radius: 8px; margin-right: 15px; object-fit: cover; background: #eee; }
        .source-tag { font-size: 10px; color: #d32f2f; font-weight: bold; background: #ffebee; padding: 2px 6px; border-radius: 4px; display: inline-block; margin: 2px 0; }
        .item-custom-msg { font-size: 11px; color: #2e7d32; font-style: italic; display: block; }
        .sold-out { color: #d32f2f; font-weight: bold; font-size: 10px; text-transform: uppercase; }

        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .delivery-toggle { display: flex; gap: 10px; margin: 15px 0; }
        .toggle-btn { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; text-align: center; font-weight: bold; }
        .toggle-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .qty-controls { display: flex; align-items: center; border: 1px solid #d4d5d9; border-radius: 4px; }
        .qty-controls button { background: white; color: var(--accent-red); border: none; width: 28px; height: 28px; font-weight: 800; }
        .btn-red { background: var(--accent-red); color: white; border: none; padding: 14px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        
        .admin-row { background: #fff; padding: 12px; border: 1px solid #eee; margin-bottom: 8px; border-radius: 8px; }
        .admin-controls { display: flex; gap: 5px; margin-top: 8px; }
        .admin-controls button { flex: 1; padding: 6px; font-size: 11px; cursor: pointer; }

        .bottom-bar { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: white; position: sticky; bottom: 0; border-top: 1px solid #eee; }
        #toast { visibility: hidden; min-width: 250px; background: #333; color: #fff; text-align: center; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 80px; transform: translateX(-50%); border-radius: 8px; }
        #toast.show { visibility: visible; }
        .checkout-btn { background: #388e3c; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="toast">Mixed orders not allowed. Please order separately.</div>

<div class="container">
    <div class="header">
        <div class="admin-icon-trigger" onclick="handleLogoClick()">
            <img id="displayLogo" src="https://cdn-icons-png.flaticon.com/512/1996/1996055.png">
        </div>
        <div>
            <h2 style="margin:0;">Cafe Baithak</h2>
            <p style="margin:2px 0 0 0; font-size:12px; font-style: italic;">Good food, great mood.</p>
        </div>
    </div>

    <div id="customerView">
        <div class="contact-card">📍 Playshire, Wagholi | 📞 9538003340</div>
        <div id="menuBanner" class="custom-banner"></div>
        <div id="menuContainer"></div>
    </div>

    <div id="loginView">
        <h3 style="text-align:center">Admin Login</h3>
        <input type="password" id="passInput" placeholder="Enter Password">
        <button class="btn-red" onclick="checkPassword()">Enter Panel</button>
        <p onclick="goHome()" style="text-align:center; color:gray; cursor:pointer; margin-top:15px;">← Cancel</p>
    </div>

    <div id="adminPanel">
        <div style="background:#f9f9f9; padding:15px; border-radius:8px; margin-bottom:15px; border:1px solid #ddd;">
            <h4>Global Settings</h4>
            <input type="text" id="adminMenuMsg" placeholder="Banner Message">
            <input type="number" id="adminDelCharge" placeholder="Delivery Fee (₹)">
            <button class="btn-red" style="background:#444;" onclick="saveSettings()">Save Settings</button>
        </div>

        <div id="adminForm" style="background:#eee; padding:15px; border-radius:8px;">
            <h4 id="formTitle">Add Menu Item</h4>
            <input type="hidden" id="editId">
            <input type="text" id="itemName" placeholder="Item Name">
            <input type="number" id="itemPrice" placeholder="Price (₹)">
            <input type="text" id="itemNote" placeholder="Custom Note (e.g. 2 pieces)">
            <select id="itemCat">
                <option value="Snacks">Snacks</option>
                <option value="Beverages">Beverages</option>
                <option value="From Baba's Kitchen">From Baba's Kitchen</option>
            </select>
            <select id="itemSource">
                <option value="Admin">Admin (Cafe Baithak)</option>
                <option value="Baba">Baba (Baba's Kitchen)</option>
            </select>
            <input type="file" id="itemFile" accept="image/*">
            <button class="btn-red" id="saveBtn" onclick="saveItem()">Add to Menu</button>
            <button id="cancelEdit" style="display:none; width:100%; border:none; background:none; color:blue; margin-top:10px;" onclick="resetForm()">Cancel Edit</button>
        </div>
        <div id="adminMenuDisplay" style="margin-top:20px;"></div>
        <button onclick="logout()" style="width:100%; margin-top:20px; color:red; border:none; background:none;">Logout</button>
    </div>

    <div id="summaryView">
        <h3>Checkout</h3>
        <div class="delivery-toggle">
            <div id="btnPickup" class="toggle-btn" onclick="setMode('Pickup')">Self Pickup</div>
            <div id="btnDelivery" class="toggle-btn active" onclick="setMode('Delivery')">Home Delivery</div>
        </div>
        <div id="summaryItems" style="background:#f9f9f9; padding:15px; border-radius:8px;"></div>
        <input type="text" id="custName" placeholder="Your Name">
        <textarea id="custAddr" placeholder="Delivery Address" rows="3"></textarea>
        <button class="btn-red" onclick="sendOrder()">Order on WhatsApp</button>
        <p onclick="goHome()" style="text-align:center; color:gray; cursor:pointer;">← Back</p>
    </div>

    <div id="bottomBar" class="bottom-bar">
        <div><strong>₹<span id="totalDisplay">0</span></strong><br><small>TOTAL</small></div>
        <button class="checkout-btn" onclick="showSummary()">Checkout</button>
    </div>
</div>

<script type="module">
    // 1. Firebase Imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC9ZnTGCvWofbETHuxsWxqYhOQI-qr5D-Y",
        authDomain: "cafebaitak.firebaseapp.com",
        databaseURL: "https://cafebaitak-default-rtdb.firebaseio.com",
        projectId: "cafebaitak",
        storageBucket: "cafebaitak.firebasestorage.app",
        messagingSenderId: "469277261083",
        appId: "1:469277261083:web:7780e7bcb45c0bc885e7be",
        measurementId: "G-X6W8C8TWZH"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 2. State & Persistence
    let menuData = []; 
    let bannerMsg = localStorage.getItem('menuMsg') || "";
    let delCharge = localStorage.getItem('delCharge') || 30;
    let cart = {};
    let currentMode = 'Delivery';
    let clickCount = 0;
    let clickTimer = null;

    // --- FIREBASE REAL-TIME LISTENER ---
    onSnapshot(collection(db, "menu"), (snapshot) => {
        menuData = snapshot.docs.map(doc => ({ 
            docId: doc.id, // Important for updates/deletes
            ...doc.data() 
        }));
        window.renderMenu();
        if(document.getElementById('adminPanel').style.display === 'block') {
            window.renderAdminMenu();
        }
    });

    // 3. Admin & Auth
    window.handleLogoClick = function() {
        clickCount++;
        clearTimeout(clickTimer);
        clickTimer = setTimeout(() => { clickCount = 0; }, 2000);
        if (clickCount === 5) { clickCount = 0; window.showLogin(); }
    };

    window.showLogin = function() { hideAll(); document.getElementById('loginView').style.display = 'block'; document.getElementById('passInput').value = ""; };
    
    window.checkPassword = function() { 
        if(document.getElementById('passInput').value === 'baba') { 
            hideAll(); 
            document.getElementById('adminPanel').style.display = 'block'; 
            window.renderAdminMenu(); 
        } else { alert("Wrong Password"); window.goHome(); } 
    };

    // 4. Admin Actions
    window.saveSettings = function() {
        bannerMsg = document.getElementById('adminMenuMsg').value;
        delCharge = document.getElementById('adminDelCharge').value || 0;
        localStorage.setItem('menuMsg', bannerMsg);
        localStorage.setItem('delCharge', delCharge);
        init();
        alert("Global Settings Updated!");
    };

    window.saveItem = async function() {
        const editId = document.getElementById('editId').value;
        const name = document.getElementById('itemName').value;
        const price = document.getElementById('itemPrice').value;
        const note = document.getElementById('itemNote').value;
        const cat = document.getElementById('itemCat').value;
        const src = document.getElementById('itemSource').value;
        const file = document.getElementById('itemFile').files[0];

        if(!name || !price) return alert("Missing Info");

        let img = "https://cdn-icons-png.flaticon.com/512/1147/1147805.png";
        if(file) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            img = await new Promise(r => reader.onload = () => r(reader.result));
        } else if(editId) {
            img = menuData.find(i => i.id == editId).img;
        }

        const itemContent = { 
            id: editId ? parseInt(editId) : Date.now(),
            name, 
            price: parseInt(price), 
            note, 
            category: cat, 
            managedBy: src, 
            img, 
            active: true 
        };

        try {
            if(editId) {
                const cloudDoc = menuData.find(i => i.id == editId);
                await updateDoc(doc(db, "menu", cloudDoc.docId), itemContent);
            } else {
                await addDoc(collection(db, "menu"), itemContent);
            }
            window.resetForm();
        } catch(e) { console.error("Cloud Error:", e); alert("Error saving to cloud. Check rules."); }
    };

    window.deleteItem = async (id) => { 
        if(confirm("Permanently delete this item?")) { 
            const cloudDoc = menuData.find(i => i.id == id);
            try { await deleteDoc(doc(db, "menu", cloudDoc.docId)); } catch(e) { console.error(e); }
        } 
    };

    window.toggleActive = async (id) => {
        const cloudDoc = menuData.find(i => i.id == id);
        try { 
            await updateDoc(doc(db, "menu", cloudDoc.docId), { active: !cloudDoc.active }); 
        } catch(e) { console.error(e); }
    };

    window.editItem = (id) => {
        const i = menuData.find(item => item.id == id);
        document.getElementById('editId').value = i.id;
        document.getElementById('itemName').value = i.name;
        document.getElementById('itemPrice').value = i.price;
        document.getElementById('itemNote').value = i.note || "";
        document.getElementById('itemCat').value = i.category;
        document.getElementById('itemSource').value = i.managedBy;
        document.getElementById('formTitle').innerText = "Edit Item";
        document.getElementById('saveBtn').innerText = "Update Item";
        document.getElementById('cancelEdit').style.display = "block";
        window.scrollTo(0,0);
    };

    // 5. User UI & Cart
    window.renderMenu = () => {
        const container = document.getElementById('menuContainer');
        container.innerHTML = "";
        ["Snacks", "Beverages", "From Baba's Kitchen"].forEach(cat => {
            const items = menuData.filter(i => i.category === cat);
            if(items.length > 0) {
                container.innerHTML += `<div class="category-header">${cat}</div>`;
                items.forEach(item => {
                    cart[item.id] = cart[item.id] || 0;
                    const inactive = item.active === false;
                    container.innerHTML += `
                    <div class="menu-item ${inactive ? 'is-inactive' : ''}">
                        <img src="${item.img}" class="item-img">
                        <div style="flex:1">
                            <strong>${item.name}</strong> ${inactive ? '<span class="sold-out">Sold Out</span>' : ''}<br>
                            ${item.note ? `<span class="item-custom-msg">${item.note}</span>` : ""}
                            <span class="source-tag">${item.managedBy === 'Baba' ? "Baba's Kitchen" : "Cafe Baithak"}</span><br>
                            <small>₹${item.price}</small>
                        </div>
                        <div class="qty-controls">
                            <button onclick="changeQty(${item.id},-1)">-</button>
                            <span id="q-${item.id}">${cart[item.id]}</span>
                            <button onclick="changeQty(${item.id},1)">+</button>
                        </div>
                    </div>`;
                });
            }
        });
    };

    window.changeQty = (id, delta) => {
        const item = menuData.find(i => i.id == id);
        const activeMgr = item.managedBy || "Admin";
        const currentInCart = Object.keys(cart).filter(k => cart[k] > 0);
        
        if(delta > 0 && currentInCart.length > 0) {
            const first = menuData.find(i => i.id == currentInCart[0]);
            if(first.managedBy !== activeMgr) {
                const t = document.getElementById("toast");
                t.className = "show";
                setTimeout(() => t.className = t.className.replace("show", ""), 3000);
                return;
            }
        }
        cart[id] = Math.max(0, (cart[id] || 0) + delta);
        const el = document.getElementById('q-'+id);
        if(el) el.innerText = cart[id];
        window.updateTotal();
    };

    window.updateTotal = () => {
        let t = 0;
        menuData.forEach(i => t += (cart[i.id] || 0) * i.price);
        document.getElementById('totalDisplay').innerText = t;
    };

    window.renderAdminMenu = () => {
        const d = document.getElementById('adminMenuDisplay');
        d.innerHTML = "<h4>Menu Items (Cloud Sync)</h4>";
        menuData.forEach(i => {
            d.innerHTML += `<div class="admin-row">
                <strong>${i.name}</strong> (₹${i.price})<br>
                <div class="admin-controls">
                    <button onclick="editItem(${i.id})">Edit</button>
                    <button onclick="toggleActive(${i.id})">${i.active === false ? 'Enable' : 'Sold Out'}</button>
                    <button onclick="deleteItem(${i.id})" style="color:red">Delete</button>
                </div>
            </div>`;
        });
    };

    // 6. Checkout Logic
    window.setMode = (mode) => {
        currentMode = mode;
        document.getElementById('btnPickup').className = `toggle-btn ${mode === 'Pickup' ? 'active' : ''}`;
        document.getElementById('btnDelivery').className = `toggle-btn ${mode === 'Delivery' ? 'active' : ''}`;
        document.getElementById('custAddr').style.display = mode === 'Delivery' ? 'block' : 'none';
        window.showSummary();
    };

    window.showSummary = () => {
        let sub = 0, isBaba = false, html = "";
        menuData.forEach(i => {
            if(cart[i.id] > 0) {
                html += `<div style="display:flex;

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firestore Web Exchange</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #039be5; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0277bd; }
        #data-display { margin-top: 20px; padding: 10px; border-top: 1px solid #eee; }
        .data-item { background: #e3f2fd; padding: 5px; margin: 5px 0; border-radius: 4px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>Firestore Exchange</h2>
    <input type="text" id="userInput" placeholder="Enter some data...">
    <button id="saveBtn">Send to Firestore</button>

    <div id="data-display">
        <strong>Recent Data:</strong>
        <div id="list">Loading...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 1. REPLACE THIS WITH YOUR CONFIG FROM FIREBASE CONSOLE
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const dataCollection = collection(db, "web_test"); // The folder/collection name

    // 2. WRITE DATA
    const inputField = document.getElementById('userInput');
    const saveBtn = document.getElementById('saveBtn');

    saveBtn.addEventListener('click', async () => {
        const text = inputField.value;
        if (text) {
            try {
                await addDoc(dataCollection, {
                    content: text,
                    timestamp: new Date()
                });
                inputField.value = "";
                alert("Data saved!");
            } catch (e) {
                console.error("Error adding document: ", e);
            }
        }
    });

    // 3. READ DATA (Real-time listener)
    const listDiv = document.getElementById('list');
    const q = query(dataCollection, orderBy("timestamp", "desc"), limit(5));

    onSnapshot(q, (snapshot) => {
        listDiv.innerHTML = ""; // Clear list
        snapshot.forEach((doc) => {
            const item = document.createElement('div');
            item.className = 'data-item';
            item.textContent = doc.data().content;
            listDiv.appendChild(item);
        });
        if (snapshot.empty) listDiv.innerHTML = "No data yet.";
    });
</script>

</body>
</html>

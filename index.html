<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Baithak - Admin Panel</title>
    <style>
        :root {--primary: #d32f2f; --primary-dark: #b71c1c; --accent-red: #e53935; --text-dark: #282c3f; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; color: var(--text-dark); }
        .container { max-width: 450px; margin: 0 auto; background: white; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; padding: 25px 20px; display: flex; align-items: center; }
        .admin-icon-trigger { width: 55px; height: 55px; background: white; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-right: 15px; overflow: hidden; border: 2px solid rgba(255,255,255,0.5); }
        #displayLogo { width: 100%; height: 100%; object-fit: cover; }
        #customerView, #adminPanel, #loginView { padding: 20px; }
        #adminPanel, #loginView { display: none; }
        .category-header { background: #f8f8f8; padding: 10px 15px; margin: 20px -20px 10px -20px; border-left: 5px solid var(--primary); font-weight: bold; color: var(--primary); text-transform: uppercase; font-size: 13px; }
        .menu-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .item-img { width: 55px; height: 55px; border-radius: 8px; margin-right: 15px; object-fit: cover; background: #eee; }
        .btn-red { background: var(--accent-red); color: white; border: none; padding: 14px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .admin-row { background: #fff; padding: 12px; border: 1px solid #eee; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .bottom-bar { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: white; position: sticky; bottom: 0; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="admin-icon-trigger" onclick="handleLogoClick()">
                <img id="displayLogo" src="https://cdn-icons-png.flaticon.com/512/1996/1996055.png">
            </div>
            <div><h2 style="margin:0;">Cafe Baithak</h2><p style="font-size:12px;">Good food, great mood.</p></div>
        </div>

        <div id="customerView"><div id="menuContainer"></div></div>

        <div id="loginView">
            <h3 style="text-align:center">Admin Login</h3>
            <input type="password" id="passInput" placeholder="Enter Password">
            <button class="btn-red" onclick="checkPassword()">Enter Panel</button>
        </div>

        <div id="adminPanel">
            <div id="adminForm">
                <h4 id="formTitle">Add Menu Item</h4>
                <input type="hidden" id="editId">
                <input type="text" id="itemName" placeholder="Item Name">
                <input type="number" id="itemPrice" placeholder="Price (₹)">
                <select id="itemCat">
                    <option value="Snacks">Snacks</option>
                    <option value="Beverages">Beverages</option>
                    <option value="From Baba's Kitchen">From Baba's Kitchen</option>
                </select>
                <button class="btn-red" onclick="saveItem()">Add to Menu</button>
                <button onclick="resetForm()" style="width:100%; margin-top:5px; border:none; background:none; cursor:pointer;">Cancel Edit</button>
            </div>
            <hr>
            <div id="adminMenuDisplay"></div>
            <button onclick="logout()" style="color:red; border:none; background:none; width:100%; margin-top:20px; cursor:pointer;">Logout</button>
        </div>

        <div id="bottomBar" class="bottom-bar">
            <div><strong>₹<span id="totalDisplay">0</span></strong><br><small>TOTAL</small></div>
            <button class="btn-red" style="width:auto; padding: 10px 20px;">Checkout</button>
        </div>
    </div>

    <script>
        let menuData = [];
        let clickCount = 0;

        function handleLogoClick() {
            clickCount++;
            setTimeout(() => { clickCount = 0; }, 3000);
            if (clickCount === 5) showLogin();
        }

        function showLogin() {
            document.getElementById('customerView').style.display = 'none';
            document.getElementById('bottomBar').style.display = 'none';
            document.getElementById('loginView').style.display

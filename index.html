<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Baithak - Hunger Jargon</title>
    <style>
        :root {--primary: #d32f2f; --primary-dark: #b71c1c; --accent-red: #e53935; --text-dark: #282c3f; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; color: var(--text-dark); }
        .container { max-width: 450px; margin: 0 auto; background: white; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; padding: 25px 20px; display: flex; align-items: center; }
        .admin-icon-trigger { width: 55px; height: 55px; background: white; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-right: 15px; overflow: hidden; border: 2px solid rgba(255,255,255,0.5); -webkit-tap-highlight-color: transparent; }
        #displayLogo { width: 100%; height: 100%; object-fit: cover; }
        #customerView, #adminPanel, #loginView, #summaryView { padding: 20px; }
        #adminPanel, #loginView, #summaryView { display: none; }
        .contact-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); margin-top: -40px; position: relative; border-bottom: 2px solid var(--primary); font-size: 13px; text-align: center; }
        .custom-banner { background: #fff3e0; border: 1px dashed #ff9800; color: #e65100; padding: 10px; border-radius: 8px; margin: 15px 0; font-size: 13px; text-align: center; font-weight: 500; display: none; }
        .category-header { background: #f8f8f8; padding: 10px 15px; margin: 20px -20px 10px -20px; border-left: 5px solid var(--primary); font-weight: bold; color: var(--primary); text-transform: uppercase; font-size: 13px; }
        .menu-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .menu-item.is-inactive { filter: grayscale(100%); opacity: 0.5; pointer-events: none; }
        .item-img { width: 55px; height: 55px; border-radius: 8px; margin-right: 15px; object-fit: cover; background: #eee; }
        .source-tag { font-size: 10px; color: #d32f2f; font-weight: bold; background: #ffebee; padding: 2px 6px; border-radius: 4px; display: inline-block; margin: 2px 0; }
        .item-custom-msg { font-size: 11px; color: #2e7d32; font-style: italic; display: block; }
        .sold-out { color: #d32f2f; font-weight: bold; font-size: 10px; text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .delivery-toggle { display: flex; gap: 10px; margin: 15px 0; }
        .toggle-btn { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; text-align: center; font-weight: bold; }
        .toggle-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .qty-controls { display: flex; align-items: center; border: 1px solid #d4d5d9; border-radius: 4px; }
        .qty-controls button { background: white; color: var(--accent-red); border: none; width: 28px; height: 28px; font-weight: 800; }
        .btn-red { background: var(--accent-red); color: white; border: none; padding: 14px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .admin-row { background: #fff; padding: 12px; border: 1px solid #eee; margin-bottom: 8px; border-radius: 8px; }
        .admin-controls { display: flex; gap: 5px; margin-top: 8px; }
        .admin-controls button { flex: 1; padding: 6px; font-size: 11px; cursor: pointer; }
        .bottom-bar { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: white; position: sticky; bottom: 0; border-top: 1px solid #eee; }
        #toast { visibility: hidden; min-width: 250px; background: #333; color: #fff; text-align: center; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 80px; transform: translateX(-50%); border-radius: 8px; }
        #toast.show { visibility: visible; }
    </style>
</head>

    <div class="container">
        <div class="header">
            <div class="admin-icon-trigger" onclick="handleLogoClick()">
                <img id="displayLogo" src="https://cdn-icons-png.flaticon.com/512/1996/1996055.png">
            </div>
            <div>
                <h2 style="margin:0;">Cafe Baithak</h2>
                <p style="margin:2px 0 0 0; font-size:12px; font-style: italic;">Good food, great mood.</p>
            </div>
        </div>

        <div id="customerView">
            <div class="contact-card">📍 Playshire, Wagholi | 📞 9538003340</div>
            <div id="menuBanner" class="custom-banner"></div>
            <div id="menuContainer"></div>
        </div>

        <div id="loginView">
            <h3 style="text-align:center">Admin Login</h3>
            <input type="password" id="passInput" placeholder="Enter Password">

            <p onclick="goHome()" style="text-align:center; color:gray; cursor:pointer; margin-top:15px;">← Cancel</p>

                <input type="text" id="adminMenuMsg" placeholder="Banner Message">
                <input type="number" id="adminDelCharge" placeholder="Delivery Fee (₹)">
                <button class="btn-red" style="background:#444;" onclick="saveSettings()">Save Settings</button>
            </div>
            <div id="adminForm" style="background:#eee; padding:15px; border-radius:8px;">
                <h4 id="formTitle">Add Menu Item</h4>
                <input type="hidden" id="editId">

                <input type="number" id="itemPrice" placeholder="Price (₹)">
                <input type="text" id="itemNote" placeholder="Custom Note (e.g. 2 pieces)">

                    <option value="Beverages">Beverages</option>
                    <option value="From Baba's Kitchen">From Baba's Kitchen</option>
                </select>
                <select id="itemSource">

                    <option value="Baba">Baba (Baba's Kitchen)</option>
